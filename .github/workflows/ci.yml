name: AKFES v2 CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - v2-tauri-refactor
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: akfes-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: FastAPI tests and lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Install server dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run Ruff
        id: ruff
        shell: bash
        run: |
          set +e
          python -m ruff check . --output-format=concise 2>&1 | tee ruff-report.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: server/ruff-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Run pytest
        env:
          AKFES_ENVIRONMENT: test
          AKFES_DATABASE_PATH: ${{ runner.temp }}/akfes-ci.sqlite3
          AKFES_LICENSE_HMAC_SECRET: ci-only-license-secret-00000000000000000000000000000000
          AKFES_ADMIN_TOKEN: ci-only-admin-token-000000000000000000000000000000000
        run: python -m pytest

  desktop-web:
    name: React and TypeScript build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check and build frontend
        run: npm --workspace apps/desktop run build

  desktop-rust:
    name: Tauri Rust check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            patchelf \
            pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Prepare frontendDist for Tauri context
        run: |
          mkdir -p ../dist
          printf '<!doctype html><html><body>CI placeholder</body></html>\n' > ../dist/index.html

      - name: Run cargo check
        id: cargo
        shell: bash
        env:
          RUST_BACKTRACE: "1"
        run: |
          set +e
          cargo check 2>&1 | tee cargo-check.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload Cargo diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-diagnostics
          path: apps/desktop/src-tauri/cargo-check.txt
          if-no-files-found: error
          retention-days: 7
