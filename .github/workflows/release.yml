name: Publish AKFES Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: akfes-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            patchelf \
            pkg-config

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "server[dev]"
          npm install --no-audit --no-fund

      - name: Verify tag and application versions
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          expected = tag.removeprefix("v")
          files = [
              Path("package.json"),
              Path("apps/desktop/package.json"),
              Path("apps/admin/package.json"),
              Path("apps/desktop/src-tauri/tauri.conf.json"),
              Path("apps/admin/src-tauri/tauri.conf.json"),
          ]
          mismatches = []
          for path in files:
              version = json.loads(path.read_text(encoding="utf-8"))["version"]
              if version != expected:
                  mismatches.append(f"{path}: {version}")
          if mismatches:
              raise SystemExit(
                  f"Tag {tag} does not match application versions:\n" + "\n".join(mismatches)
              )

      - name: Run server checks
        working-directory: server
        env:
          AKFES_ENVIRONMENT: test
          AKFES_DATABASE_PATH: ${{ runner.temp }}/akfes-release.sqlite3
          AKFES_LICENSE_HMAC_SECRET: release-check-license-secret-000000000000000000000000
          AKFES_ADMIN_TOKEN: release-check-admin-token-000000000000000000000000000
        run: |
          python -m ruff check .
          python -m pytest

      - name: Build web applications
        run: |
          npm --workspace apps/desktop run build
          npm --workspace apps/admin run build

      - name: Check Rust applications
        run: |
          cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
          cargo check --manifest-path apps/admin/src-tauri/Cargo.toml

  windows-release:
    name: Build signed-ready Windows release
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri
            apps/admin/src-tauri

      - name: Build FastAPI sidecar
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "server[dev]" pyinstaller
          python -m PyInstaller --noconfirm --clean --onefile --name akfes-server --paths server server/sidecar.py
          Copy-Item dist/akfes-server.exe apps/desktop/src-tauri/binaries/akfes-server.exe -Force
          Copy-Item dist/akfes-server.exe apps/admin/src-tauri/binaries/akfes-server.exe -Force

      - name: Smoke test packaged server
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "dist/akfes-server.exe" -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Milliseconds 500
              try {
                $response = Invoke-RestMethod -Uri "http://127.0.0.1:8000/health" -TimeoutSec 2
                if ($response.status -eq "ok") {
                  $ready = $true
                  break
                }
              } catch {}
            }
            if (-not $ready) { throw "Packaged FastAPI server did not become healthy." }
          } finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Build Windows installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm run desktop:build
          npm run admin:build

      - name: Collect release files and checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $desktop = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          $admin = Get-ChildItem "apps/admin/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          $desktopName = "AKFES-${{ github.ref_name }}-Windows-x64-Setup.exe"
          $adminName = "AKFES-License-Manager-${{ github.ref_name }}-Windows-x64-Setup.exe"
          Copy-Item $desktop.FullName "release/$desktopName"
          Copy-Item $admin.FullName "release/$adminName"
          Copy-Item "$($desktop.FullName).sig" "release/$desktopName.sig"
          Copy-Item "$($admin.FullName).sig" "release/$adminName.sig"
          Copy-Item "dist/akfes-server.exe" "release/akfes-server-${{ github.ref_name }}-Windows-x64.exe"
          $releaseBase = "https://github.com/Smarttiger2338/AKFES-APP/releases/download/${{ github.ref_name }}"
          $publishedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $desktopManifest = @{
            version = "${{ github.ref_name }}".TrimStart("v")
            notes = "AKFES ${{ github.ref_name }}"
            pub_date = $publishedAt
            platforms = @{
              "windows-x86_64" = @{
                signature = (Get-Content "release/$desktopName.sig" -Raw).Trim()
                url = "$releaseBase/$desktopName"
              }
            }
          }
          $adminManifest = @{
            version = "${{ github.ref_name }}".TrimStart("v")
            notes = "AKFES License Manager ${{ github.ref_name }}"
            pub_date = $publishedAt
            platforms = @{
              "windows-x86_64" = @{
                signature = (Get-Content "release/$adminName.sig" -Raw).Trim()
                url = "$releaseBase/$adminName"
              }
            }
          }
          $desktopManifest | ConvertTo-Json -Depth 5 | Set-Content "release/latest-desktop.json" -Encoding UTF8
          $adminManifest | ConvertTo-Json -Depth 5 | Set-Content "release/latest-admin.json" -Encoding UTF8
          Get-ChildItem release/* | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Add-Content "release/SHA256SUMS.txt"
          }

      - name: Upload release staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: AKFES-${{ github.ref_name }}-release
          path: release/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release/*
          fail_on_unmatched_files: true
