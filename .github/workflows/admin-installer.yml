name: Build AKFES License Manager

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "apps/admin/**"
      - "server/**"
      - "package.json"
      - ".github/workflows/admin-installer.yml"
  push:
    branches:
      - v2-tauri-refactor
    paths:
      - "apps/admin/**"
      - "server/**"
      - "package.json"
      - ".github/workflows/admin-installer.yml"

permissions:
  contents: read

concurrency:
  group: akfes-admin-installer-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build License Manager installer
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/admin/src-tauri

      - name: Build FastAPI sidecar
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./server pyinstaller
          python -m PyInstaller --onefile --name akfes-server --paths server --collect-all uvicorn --collect-all fastapi server/sidecar.py
          New-Item -ItemType Directory -Force apps/admin/src-tauri/binaries | Out-Null
          Copy-Item dist/akfes-server.exe apps/admin/src-tauri/binaries/akfes-server.exe -Force

      - name: Smoke test packaged server
        shell: pwsh
        run: |
          $process = Start-Process -FilePath ./dist/akfes-server.exe -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              try {
                $response = Invoke-RestMethod http://127.0.0.1:8000/health
                if ($response.status -eq "ok") { $ready = $true; break }
              } catch {}
            }
            if (-not $ready) { throw "Packaged AKFES server did not become ready" }
          } finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Build License Manager NSIS installer
        run: npm run admin:build

      - name: Upload License Manager installer
        uses: actions/upload-artifact@v4
        with:
          name: AKFES-License-Manager
          path: apps/admin/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
