name: Build AKFES Windows Installer

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "server/**"
      - "package.json"
      - ".github/workflows/windows-installer.yml"
  push:
    branches:
      - v2-tauri-refactor
    paths:
      - "apps/desktop/**"
      - "server/**"
      - "package.json"
      - ".github/workflows/windows-installer.yml"

permissions:
  contents: read

concurrency:
  group: akfes-windows-installer-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build NSIS installer with server
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Build FastAPI sidecar
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e server pyinstaller
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --name akfes-server `
            --paths server `
            --collect-all uvicorn `
            server/sidecar.py
          New-Item -ItemType Directory -Force apps/desktop/src-tauri/binaries | Out-Null
          Copy-Item dist/akfes-server.exe apps/desktop/src-tauri/binaries/akfes-server.exe -Force

      - name: Smoke test packaged server
        shell: pwsh
        run: |
          $server = Start-Process `
            -FilePath "apps/desktop/src-tauri/binaries/akfes-server.exe" `
            -PassThru `
            -WindowStyle Hidden
          try {
            $healthy = $false
            for ($attempt = 0; $attempt -lt 40; $attempt++) {
              Start-Sleep -Milliseconds 500
              try {
                $response = Invoke-RestMethod -Uri "http://127.0.0.1:8000/health" -TimeoutSec 2
                if ($response.status -eq "ok") {
                  $healthy = $true
                  break
                }
              } catch {
              }
            }
            if (-not $healthy) {
              throw "Packaged FastAPI server did not become healthy."
            }
          } finally {
            if (-not $server.HasExited) {
              Stop-Process -Id $server.Id -Force
            }
          }

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Build NSIS installer
        run: npm run desktop:build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AKFES-Windows-Installer
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload standalone server for diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: AKFES-Server-Sidecar
          path: apps/desktop/src-tauri/binaries/akfes-server.exe
          if-no-files-found: error
          retention-days: 14
